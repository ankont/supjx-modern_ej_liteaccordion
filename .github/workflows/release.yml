name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate tag matches manifest version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content 'module/mod_ej_liteaccordion.xml' -Raw
          $version = $manifest.extension.version.Trim()
          $tag = '${{ github.ref_name }}'
          $normalizedTag = $tag.TrimStart('v')

          if ($normalizedTag -ne $version) {
              throw "Tag '$tag' does not match manifest version '$version'."
          }

      - name: Build installable ZIP
        shell: pwsh
        run: ./build/build.ps1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/output/*.zip

